<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cost-Effectiveness Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0a0a0a; --ink-soft: #404040; --muted: #737373; --faint: #a3a3a3;
    --bg: #ffffff; --surface: #ffffff; --panel: #fafafa;
    --border: #e5e5e5; --border-strong: #0a0a0a;
    --teal: #0f766e; --teal-soft: #ecfdf5; --clay: #9a6a3a;
    --red: #b91c1c; --red-soft: #fef2f2; --amber: #b45309; --amber-soft: #fffbeb;
    --green: #047857; --green-soft: #ecfdf5;
    --radius: 4px;
  }
  body { font-family: 'Archivo', sans-serif; background: var(--bg); color: var(--ink); font-size: 14px; line-height: 1.5; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 4px; }
  .mono { font-family: 'IBM Plex Mono', monospace; }

  /* Nav */
  .nav {
    height: 52px; display: flex; align-items: center; gap: 22px;
    padding: 0 24px; background: #fff; border-bottom: 2px solid var(--ink);
    position: sticky; top: 0; z-index: 50;
  }
  .nav-brand { font-weight: 700; font-size: 15px; letter-spacing: -0.01em; }
  .nav-links { display: flex; gap: 2px; }
  .nav-link {
    font-size: 13px; padding: 6px 12px; color: var(--muted); cursor: pointer;
    border: none; background: none; font-family: inherit; border-bottom: 2px solid transparent; margin-bottom: -2px;
  }
  .nav-link.on { color: var(--ink); font-weight: 600; border-bottom-color: var(--teal); }
  .nav-spacer { flex: 1; }
  .layout-switch { display: flex; align-items: center; gap: 8px; }
  .layout-switch-label { font-size: 11px; color: var(--faint); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
  .seg { display: flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .seg button {
    font-size: 11px; padding: 5px 10px; border: none; background: #fff; color: var(--muted);
    cursor: pointer; font-family: inherit; border-right: 1px solid var(--border);
  }
  .seg button:last-child { border-right: none; }
  .seg button.on { background: var(--ink); color: #fff; font-weight: 600; }

  /* Page shell */
  .shell { max-width: 1480px; margin: 0 auto; }
  .hero { padding: 22px 24px 18px; border-left: 3px solid var(--teal); margin: 22px 24px 0; }
  .hero h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
  .hero p { color: var(--muted); font-size: 13px; margin-top: 3px; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .card-h {
    padding: 11px 15px; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em;
    background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;
  }
  .card-b { padding: 16px; }

  /* Buttons */
  .btn { font-family: inherit; font-size: 12px; padding: 6px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: #fff; color: var(--ink); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; font-weight: 500; }
  .btn:hover { background: var(--panel); }
  .btn-ink { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn-ink:hover { background: #262626; }
  .btn-teal { background: var(--teal); color: #fff; border-color: var(--teal); }
  .btn-run {
    width: 100%; padding: 13px; background: var(--ink); color: #fff; border: none; border-radius: var(--radius);
    font-family: inherit; font-weight: 600; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; letter-spacing: 0.02em;
  }
  .btn-run:hover { background: #262626; }
  .btn-run:disabled { background: #d4d4d4; cursor: not-allowed; }

  /* Tables */
  table.tbl { width: 100%; border-collapse: collapse; }
  .tbl th { text-align: left; padding: 8px 11px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); border-bottom: 1.5px solid var(--ink); font-weight: 600; }
  .tbl td { padding: 9px 11px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl td.mono, .tbl th.mono { font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  .tbl .editable:hover { background: var(--teal-soft); cursor: text; outline: 1px solid var(--teal); }
  .cell-input { width: 100%; border: 1px solid var(--teal); border-radius: 2px; padding: 3px 5px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; outline: none; }
  .tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
  .tag-ref { background: #f5f5f5; color: var(--muted); }
  .tag-ce { background: var(--green-soft); color: var(--green); }
  .tag-nce { background: var(--red-soft); color: var(--red); }
  .tag-dom { background: var(--amber-soft); color: var(--amber); }

  /* Parameters */
  .prm { display: flex; flex-direction: column; gap: 7px; }
  .prm-lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-soft); margin-bottom: 2px; }
  .radio { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; color: var(--ink-soft); }
  .radio input { accent-color: var(--teal); }
  .field { width: 100%; padding: 7px 9px; border: 1px solid var(--border); border-radius: var(--radius); font-family: inherit; font-size: 13px; background: #fff; outline: none; }
  .field.mono { font-family: 'IBM Plex Mono', monospace; }
  .field:focus { border-color: var(--teal); }
  .hint { font-size: 11px; color: var(--faint); }
  .rule { border: none; border-top: 1px solid var(--border); margin: 13px 0; }
  .check { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
  .check input { accent-color: var(--teal); }

  /* Result tabs */
  .rtabs { display: flex; gap: 0; border-bottom: 1.5px solid var(--ink); }
  .rtab { font-family: inherit; font-size: 13px; padding: 9px 15px; border: none; background: none; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1.5px; display: flex; align-items: center; gap: 6px; }
  .rtab.on { color: var(--ink); font-weight: 600; border-bottom-color: var(--teal); }
  .rtab svg { width: 14px; height: 14px; }

  /* Chart */
  .chart-block { padding: 18px 4px 4px; }
  .chart-title { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
  .chart-sub { font-size: 12px; color: var(--muted); margin: 2px 0 14px; }
  .chart-canvas-wrap { position: relative; height: 340px; }

  /* Price threshold stats */
  .pt-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-top: 16px; }
  .pt-stat { border: 1px solid var(--border); border-radius: var(--radius); padding: 13px; text-align: center; }
  .pt-val { font-family: 'IBM Plex Mono', monospace; font-size: 19px; font-weight: 600; }
  .pt-lbl { font-size: 10px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

  .psa-chips { display: flex; gap: 10px; margin-bottom: 14px; }
  .chip { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 2px; }
  .chip-ce { background: var(--green-soft); color: var(--green); }
  .chip-nce { background: var(--red-soft); color: var(--red); }

  .interp { border: 1px solid var(--border); border-radius: var(--radius); padding: 15px; font-size: 13px; line-height: 1.75; }
  .interp.ok { border-left: 3px solid var(--green); }
  .interp.warn { border-left: 3px solid var(--amber); }

  /* Empty state */
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; min-height: 320px; color: var(--faint); text-align: center; gap: 10px; padding: 40px; }
  .empty svg { width: 40px; height: 40px; opacity: 0.4; }
  .empty-t { font-size: 14px; font-weight: 600; color: var(--muted); }
  .empty-s { font-size: 12px; max-width: 280px; }

  .spinner { display: inline-block; width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .notif { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff; padding: 10px 18px; border-radius: var(--radius); font-size: 13px; z-index: 300; box-shadow: 0 6px 20px rgba(0,0,0,0.2); }

  /* ── Layout-specific ─────────────────────────────────── */
  /* split */
  .L-split .work { display: grid; grid-template-columns: 460px 1fr; gap: 18px; padding: 18px 24px 40px; align-items: start; }
  .L-split .work > .left { display: flex; flex-direction: column; gap: 16px; position: sticky; top: 70px; }
  /* tabs */
  .L-tabs .subtabs { display: flex; gap: 2px; padding: 14px 24px 0; }
  .subtab { font-family: inherit; font-size: 13px; font-weight: 600; padding: 9px 18px; border: 1px solid var(--border); border-bottom: none; border-radius: var(--radius) var(--radius) 0 0; background: var(--panel); color: var(--muted); cursor: pointer; }
  .subtab.on { background: #fff; color: var(--ink); border-color: var(--ink); border-bottom: 1px solid #fff; margin-bottom: -1px; }
  .subtab:disabled { opacity: 0.45; cursor: not-allowed; }
  .L-tabs .tabpane { padding: 0 24px 40px; }
  .L-tabs .tabpane-inner { border: 1px solid var(--border); border-top: 1.5px solid var(--ink); border-radius: 0 var(--radius) var(--radius) var(--radius); padding: 20px; }
  /* collapse */
  .L-collapse .work { padding: 18px 24px 40px; display: flex; flex-direction: column; gap: 18px; }
  .summary-bar { position: sticky; top: 54px; z-index: 40; display: flex; align-items: center; gap: 14px; background: var(--ink); color: #fff; padding: 11px 16px; border-radius: var(--radius); }
  .summary-bar .sb-item { font-size: 12px; display: flex; align-items: center; gap: 6px; }
  .summary-bar .sb-item .mono { color: #fff; }
  .summary-bar .sb-k { color: #a3a3a3; text-transform: uppercase; letter-spacing: 0.05em; font-size: 10px; }
  /* drawer */
  .drawer-backdrop { position: fixed; inset: 0; background: rgba(10,10,10,0.4); z-index: 200; animation: fade 0.2s; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: min(940px, 78vw); background: #fff; z-index: 201; box-shadow: -8px 0 30px rgba(0,0,0,0.15); display: flex; flex-direction: column; animation: slidein 0.25s ease; }
  @keyframes slidein { from { transform: translateX(40px); opacity: 0.4; } to { transform: translateX(0); opacity: 1; } }
  .drawer-h { display: flex; align-items: center; justify-content: space-between; padding: 16px 22px; border-bottom: 2px solid var(--ink); }
  .drawer-h h2 { font-size: 17px; font-weight: 700; }
  .drawer-body { flex: 1; overflow-y: auto; padding: 20px 22px; }
  .icon-btn { background: none; border: none; cursor: pointer; padding: 5px; color: var(--muted); border-radius: var(--radius); display: flex; }
  .icon-btn:hover { background: var(--panel); color: var(--ink); }

  /* Tweaks */
  .tweaks { position: fixed; bottom: 22px; right: 22px; width: 270px; background: #fff; border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 400; overflow: hidden; }
  .tweaks-h { background: var(--ink); color: #fff; padding: 11px 14px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; display: flex; justify-content: space-between; align-items: center; }
  .tweaks-b { padding: 14px; display: flex; flex-direction: column; gap: 14px; }
  .tweak label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-soft); display: block; margin-bottom: 7px; }
  .tweak-seg { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .tweak-seg button { font-family: inherit; font-size: 11px; padding: 7px 4px; border: 1px solid var(--border); border-radius: var(--radius); background: #fff; color: var(--muted); cursor: pointer; }
  .tweak-seg button.on { background: var(--ink); color: #fff; border-color: var(--ink); font-weight: 600; }
  .x-btn { background: none; border: none; color: rgba(255,255,255,0.7); font-size: 17px; cursor: pointer; line-height: 1; }
  .x-btn:hover { color: #fff; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="cea-charts.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// Icons
const SZ = {width:14,height:14,flexShrink:0};
const ITable=()=><svg style={SZ} viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="2" y="2" width="12" height="12" rx="1"/><path d="M2 6h12M2 10h12M6 2v12"/></svg>;
const IScatter=()=><svg style={SZ} viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="4" cy="12" r="1.4" fill="currentColor"/><circle cx="8" cy="6" r="1.4" fill="currentColor"/><circle cx="12" cy="9" r="1.4" fill="currentColor"/><path d="M1 15h14M1 1v14"/></svg>;
const ITornado=()=><svg style={SZ} viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M2 4h12M3 7h10M4 10h8M6 13h4"/></svg>;
const ICeac=()=><svg style={SZ} viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M1 14 Q5 14 7 9 Q10 3 15 2"/><path d="M1 15h14M1 1v14"/></svg>;
const IPrice=()=><svg style={SZ} viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M2 3 Q14 3 14 14"/><path d="M1 15h14M1 1v14"/></svg>;
const ICheck=()=><svg style={SZ} viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2.4"><path d="M3 8l4 4 6-7"/></svg>;
const IPlay=()=><svg style={SZ} viewBox="0 0 16 16" fill="currentColor"><path d="M4 3l9 5-9 5V3z"/></svg>;
const IX=()=><svg style={SZ} viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M4 4l8 8M12 4l-8 8"/></svg>;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "layoutMode": "drawer",
  "accent": "#0f766e"
}/*EDITMODE-END*/;

// ── Strategy editor ───────────────────────────────────────
function StrategyTable({data, setData}) {
  const [edit, setEdit] = useState(null);
  const [val, setVal] = useState('');
  const rows = calcICER(data);
  const start = (r,c) => { setEdit({r,c}); setVal(String(c==='strategy'?data[r].strategy:c==='cost'?data[r].cost:data[r].effect)); };
  const commit = () => {
    if (!edit) return;
    const u=[...data]; const {r,c}=edit;
    if (c==='strategy') u[r]={...u[r],strategy:val};
    else u[r]={...u[r],[c]:parseFloat(val)||0};
    setData(u); setEdit(null);
  };
  const isE=(r,c)=>edit?.r===r&&edit?.c===c;
  const cell=(r,c,disp)=> isE(r,c)
    ? <input className="cell-input" type={c==='strategy'?'text':'number'} value={val} autoFocus
        onChange={e=>setVal(e.target.value)} onBlur={commit} onKeyDown={e=>e.key==='Enter'&&commit()}/>
    : disp;
  return (
    <table className="tbl">
      <thead><tr><th>Strategy</th><th className="mono">Cost (KES)</th><th className="mono">Effect</th><th>Ref</th><th>ICER</th></tr></thead>
      <tbody>
        {data.map((row,i)=>{
          const ir = rows.find(r=>r.strategy===row.strategy);
          return (
            <tr key={i}>
              <td className="editable" onDoubleClick={()=>start(i,'strategy')}>{cell(i,'strategy',row.strategy)}</td>
              <td className="editable mono" onDoubleClick={()=>start(i,'cost')}>{cell(i,'cost',row.cost.toLocaleString())}</td>
              <td className="editable mono" onDoubleClick={()=>start(i,'effect')}>{cell(i,'effect',fmtN(row.effect))}</td>
              <td>{i===0 && <span className="tag tag-ref">Ref</span>}</td>
              <td className="mono">{ir?.status==='REF'?<span style={{color:'var(--faint)'}}>—</span>:ir?.icer!=null?fmt(ir.icer):<span className="tag tag-dom">Dom</span>}</td>
            </tr>
          );
        })}
      </tbody>
    </table>
  );
}

// ── Input panel (shared) ──────────────────────────────────
function InputPanel({s}) {
  return (
    <>
      <div className="card">
        <div className="card-h">Define Strategies</div>
        <div className="card-b">
          <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
            <button className="btn btn-teal" onClick={s.addStrategy}>+ Add Strategy</button>
            <button className="btn" onClick={s.removeStrategy}>− Remove Last</button>
            <button className="btn" onClick={s.loadSample}>↓ Load Sample</button>
          </div>
          <p className="hint" style={{marginBottom:10}}>First strategy is the reference. Double-click any cell to edit.</p>
          <StrategyTable data={s.strategies} setData={s.setStrategies}/>
        </div>
      </div>

      <div className="card">
        <div className="card-h">Analysis Parameters</div>
        <div className="card-b">
          <div className="prm">
            <span className="prm-lbl">Health Outcome</span>
            {[['hosp_days','Days of Hospitalisation Averted'],['qaly','Quality-Adjusted Life Years'],['daly','Disability-Adjusted Life Years'],['lyg','Life Years Gained'],['lives','Lives Saved']].map(([v,l])=>(
              <label key={v} className="radio"><input type="radio" name="oc" checked={s.outcomeType===v} onChange={()=>s.setOutcomeType(v)}/>{l}</label>
            ))}
          </div>
          <hr className="rule"/>
          <div className="prm">
            <span className="prm-lbl">Cost-Effectiveness Threshold</span>
            {[['gdp','0.5× GDP per capita (154,000 KES)'],['sha','SHA Hospital Rates (per day averted)']].map(([v,l])=>(
              <label key={v} className="radio"><input type="radio" name="th" checked={s.thresholdType===v} onChange={()=>s.setThresholdType(v)}/>{l}</label>
            ))}
            {s.thresholdType==='sha' && (
              <select className="field" style={{marginTop:4}} value={s.shaLevel} onChange={e=>s.setShaLevel(Number(e.target.value))}>
                <option value={2240}>Level 3 (2,240 KES/day)</option>
                <option value={3360}>Level 4 (3,360 KES/day)</option>
                <option value={3920}>Level 5 (3,920 KES/day)</option>
                <option value={4480}>Level 6 (4,480 KES/day)</option>
              </select>
            )}
            <label className="radio"><input type="radio" name="th" checked={s.thresholdType==='custom'} onChange={()=>s.setThresholdType('custom')}/>Custom</label>
            {s.thresholdType==='custom' && (
              <input className="field mono" type="number" value={s.customThreshold} onChange={e=>s.setCustomThreshold(Number(e.target.value))}/>
            )}
          </div>
          <hr className="rule"/>
          <div className="prm">
            <span className="prm-lbl">Uncertainty Analysis</span>
            <label className="check"><input type="checkbox" checked={s.enablePSA} onChange={e=>s.setEnablePSA(e.target.checked)}/>Enable Probabilistic Sensitivity Analysis</label>
            {s.enablePSA && (
              <div style={{marginTop:6}}>
                <span className="hint">Standard ±20% · </span>
                <input className="field mono" style={{width:90,display:'inline-block',marginLeft:6}} type="number" value={s.psaIter} onChange={e=>s.setPsaIter(Number(e.target.value))} step={100}/>
                <span className="hint"> iterations</span>
              </div>
            )}
          </div>
          <hr className="rule"/>
          {s.ready
            ? <div style={{fontSize:12,color:'var(--green)',display:'flex',alignItems:'center',gap:6,marginBottom:12}}><ICheck/> Ready ({s.strategies.length} strategies)</div>
            : <div style={{fontSize:12,color:'var(--amber)',marginBottom:12}}>⚠ Need ≥2 valid strategies</div>}
          <button className="btn-run" onClick={s.runAnalysis} disabled={s.running||!s.ready}>
            {s.running ? <><span className="spinner"/> Running…</> : <><IPlay/> Run Analysis</>}
          </button>
        </div>
      </div>
    </>
  );
}

// ── Results (shared) ──────────────────────────────────────
function ResultsView({res, psaData, enablePSA, bare}) {
  const [tab, setTab] = useState('icer');
  const rows = calcICER(res.strategies);
  const threshold = res.params.threshold;
  const oL = OUTCOME_LABELS[res.params.outcome_type] || 'unit';
  const tabs = [
    {id:'icer',label:'ICER Table',icon:<ITable/>},
    {id:'ceplane',label:'CE Plane',icon:<IScatter/>},
    {id:'tornado',label:'Tornado',icon:<ITornado/>},
    ...(enablePSA&&psaData?[{id:'scatter',label:'PSA Scatter',icon:<IScatter/>},{id:'ceac',label:'CEAC',icon:<ICeac/>}]:[]),
    {id:'price',label:'Price Threshold',icon:<IPrice/>},
  ];
  const hasCE = rows.some(r=>r.icer!=null&&r.icer<=threshold&&r.status!=='DOM');
  const best = rows.filter(r=>r.icer!=null&&r.icer<=threshold&&r.status==='ND').sort((a,b)=>a.icer-b.icer)[0];

  const sorted=[...res.strategies].sort((a,b)=>a.cost-b.cost);
  const target=sorted[1], refS=sorted[0];
  const ie = target?target.effect-refS.effect:1;
  const breakEven = refS.cost + threshold*ie;
  const curICER = target?(target.cost-refS.cost)/ie:0;

  const psaCE = psaData?.filter(it=>{const r=it.find(x=>x.status!=='REF'&&x.icer!=null); return r&&r.icer<=threshold;}).length||0;
  const pct = psaData?.length?Math.round(psaCE/psaData.length*100):0;

  return (
    <div>
      <div className="rtabs">
        {tabs.map(t=>(<button key={t.id} className={`rtab ${tab===t.id?'on':''}`} onClick={()=>setTab(t.id)}>{t.icon}{t.label}</button>))}
      </div>

      {tab==='icer' && (
        <div className="chart-block">
          <table className="tbl" style={{marginBottom:20}}>
            <thead><tr><th>Strategy</th><th className="mono">Cost</th><th className="mono">Effect</th><th className="mono">Inc. Cost</th><th className="mono">Inc. Effect</th><th className="mono">ICER</th><th>Status</th></tr></thead>
            <tbody>
              {rows.map((r,i)=>(
                <tr key={i}>
                  <td style={{fontWeight:500}}>{r.strategy}</td>
                  <td className="mono">{fmt(r.cost)}</td>
                  <td className="mono">{fmtN(r.effect)}</td>
                  <td className="mono">{r.inc_cost!=null?fmt(r.inc_cost):'—'}</td>
                  <td className="mono">{r.inc_effect!=null?fmtN(r.inc_effect):'—'}</td>
                  <td className="mono">{r.icer!=null?fmt(r.icer):'—'}</td>
                  <td>
                    {r.status==='REF'&&<span className="tag tag-ref">Reference</span>}
                    {r.status==='DOM'&&<span className="tag tag-dom">Dominated</span>}
                    {r.status==='ND'&&r.icer<=threshold&&<span className="tag tag-ce">Cost-effective</span>}
                    {r.status==='ND'&&r.icer>threshold&&<span className="tag tag-nce">Not CE</span>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          <div className={`interp ${hasCE?'ok':'warn'}`}>
            {rows.filter(r=>r.status!=='REF').map((r,i)=>(
              <div key={i}>
                {r.status==='DOM' && <span>• <strong>{r.strategy}</strong> — dominated (costlier, less effective).</span>}
                {r.status==='ND'&&r.icer<=threshold && <span>• <strong>{r.strategy}</strong> — cost-effective at {fmt(r.icer)} per {oL}.</span>}
                {r.status==='ND'&&r.icer>threshold && <span>• <strong>{r.strategy}</strong> — not cost-effective ({fmt(r.icer)} per {oL}), exceeds threshold.</span>}
              </div>
            ))}
            <div style={{marginTop:10,fontWeight:700}}>
              {hasCE ? `Recommendation: implement ${best?.strategy} — most cost-effective option.` : 'Recommendation: no intervention is cost-effective at this threshold.'}
            </div>
          </div>
        </div>
      )}

      {tab==='ceplane' && <div className="chart-block">
        <div className="chart-title">Cost-Effectiveness Plane</div>
        <div className="chart-sub">Incremental cost vs. incremental effect against the reference strategy</div>
        <CEPlanePlot icer_rows={rows} threshold={threshold} outcomeLabel={oL}/>
      </div>}

      {tab==='tornado' && <div className="chart-block">
        <div className="chart-title">Tornado Diagram</div>
        <div className="chart-sub">Univariate sensitivity — impact of ±20% parameter variation on the ICER</div>
        <TornadoPlot strategies={res.strategies} threshold={threshold}/>
      </div>}

      {tab==='scatter' && psaData && <div className="chart-block">
        <div className="chart-title">PSA Scatter</div>
        <div className="chart-sub">Simulated incremental cost–effect pairs across {psaData.length.toLocaleString()} iterations</div>
        <div className="psa-chips"><span className="chip chip-ce">{pct}% cost-effective</span><span className="chip chip-nce">{100-pct}% not</span></div>
        <PSAScatterPlot strategies={res.strategies} psaData={psaData} threshold={threshold}/>
      </div>}

      {tab==='ceac' && psaData && <div className="chart-block">
        <div className="chart-title">Cost-Effectiveness Acceptability Curve</div>
        <div className="chart-sub">Probability each strategy is cost-effective across willingness-to-pay thresholds</div>
        <CEACPlot strategies={res.strategies} psaData={psaData}/>
      </div>}

      {tab==='price' && <div className="chart-block">
        <div className="chart-title">Price Threshold Analysis</div>
        <div className="chart-sub">Maximum price at which {target?.strategy||'the intervention'} stays cost-effective</div>
        <PriceThresholdPlot strategies={res.strategies} threshold={threshold} outcomeLabel={oL}/>
        {target && <div className="pt-grid">
          <div className="pt-stat"><div className="pt-val">{fmt(target.cost)}</div><div className="pt-lbl">Current Price</div></div>
          <div className="pt-stat"><div className="pt-val" style={{color:breakEven>target.cost?'var(--green)':'var(--red)'}}>{fmt(breakEven)}</div><div className="pt-lbl">Break-even Price</div></div>
          <div className="pt-stat"><div className="pt-val">{fmt(curICER)}</div><div className="pt-lbl">Current ICER</div></div>
          <div className="pt-stat"><div className="pt-val" style={{color:breakEven>target.cost?'var(--green)':'var(--red)'}}>{breakEven>target.cost?'▼':'▲'} {fmt(Math.abs(breakEven-target.cost))}</div><div className="pt-lbl">{breakEven>target.cost?'Headroom':'Reduction needed'}</div></div>
        </div>}
      </div>}
    </div>
  );
}

function EmptyResults() {
  return (
    <div className="empty">
      <IScatter/>
      <div className="empty-t">No results yet</div>
      <div className="empty-s">Configure strategies and parameters, then run the analysis to see the ICER table, plots and sensitivity analysis.</div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);
  const [mainTab, setMainTab] = useState('analysis');
  const [strategies, setStrategies] = useState([
    {strategy:'Status Quo', cost:2500000, effect:450},
    {strategy:'Mass Vaccination', cost:12500000, effect:1250},
    {strategy:'Community Health Education', cost:6800000, effect:820},
  ]);
  const [outcomeType, setOutcomeType] = useState('hosp_days');
  const [thresholdType, setThresholdType] = useState('sha');
  const [shaLevel, setShaLevel] = useState(3360);
  const [customThreshold, setCustomThreshold] = useState(154000);
  const [enablePSA, setEnablePSA] = useState(true);
  const [psaIter, setPsaIter] = useState(1000);
  const [res, setRes] = useState(null);
  const [psaData, setPsaData] = useState(null);
  const [running, setRunning] = useState(false);
  const [notif, setNotif] = useState(null);
  const [subtab, setSubtab] = useState('setup');
  const [collapsed, setCollapsed] = useState(false);
  const [drawerOpen, setDrawerOpen] = useState(false);

  const layout = tweaks.layoutMode;
  const threshold = thresholdType==='gdp'?154000:thresholdType==='sha'?shaLevel:customThreshold;
  const ready = strategies.length>=2 && strategies.every(s=>s.strategy&&s.cost>=0&&s.effect>=0);

  useEffect(()=>{
    const h=e=>{ if(e.data?.type==='__activate_edit_mode')setShowTweaks(true); if(e.data?.type==='__deactivate_edit_mode')setShowTweaks(false); };
    window.addEventListener('message',h); window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message',h);
  },[]);
  const setTweak=(k,v)=>{ const n={...tweaks,[k]:v}; setTweaks(n); window.parent.postMessage({type:'__edit_mode_set_keys',edits:n},'*'); };

  const notify=m=>{ setNotif(m); setTimeout(()=>setNotif(null),3000); };
  const addStrategy=()=>{ setStrategies([...strategies,{strategy:`Strategy ${strategies.length+1}`,cost:0,effect:0}]); };
  const removeStrategy=()=>{ if(strategies.length<=2){notify('Need at least 2 strategies.');return;} setStrategies(strategies.slice(0,-1)); };
  const loadSample=()=>{ setStrategies([
    {strategy:'Status Quo',cost:2500000,effect:450},
    {strategy:'Mass Vaccination',cost:12500000,effect:1250},
    {strategy:'Community Health Education',cost:6800000,effect:820},
  ]); notify('Sample data loaded.'); };

  const runAnalysis=async()=>{
    setRunning(true);
    await new Promise(r=>setTimeout(r,650));
    const psa = enablePSA ? runPSA(strategies, Math.min(psaIter,400), 20) : null;
    setRes({strategies:[...strategies], params:{outcome_type:outcomeType, threshold, threshold_type:thresholdType, sha_level:shaLevel}});
    setPsaData(psa);
    setRunning(false);
    notify('Analysis complete.');
    if (layout==='tabs') setSubtab('results');
    if (layout==='collapse') setCollapsed(true);
    if (layout==='drawer') setDrawerOpen(true);
  };

  const sharedInput = {strategies,setStrategies,outcomeType,setOutcomeType,thresholdType,setThresholdType,shaLevel,setShaLevel,customThreshold,setCustomThreshold,enablePSA,setEnablePSA,psaIter,setPsaIter,ready,running,runAnalysis,addStrategy,removeStrategy,loadSample};

  const oL = OUTCOME_LABELS[outcomeType];
  const thLabel = thresholdType==='gdp'?'0.5× GDP':thresholdType==='sha'?`SHA ${SHA_LEVELS[shaLevel]}`:'Custom';

  return (
    <div className={`L-${layout}`}>
      <nav className="nav">
        <span className="nav-brand">Cost-Effectiveness Analysis</span>
        <div className="nav-links">
          <button className={`nav-link ${mainTab==='analysis'?'on':''}`} onClick={()=>setMainTab('analysis')}>Analysis</button>
          <button className={`nav-link ${mainTab==='help'?'on':''}`} onClick={()=>setMainTab('help')}>Help</button>
        </div>
        <div className="nav-spacer"/>
        <div className="layout-switch">
          <span className="layout-switch-label">Layout</span>
          <div className="seg">
            {[['split','Split'],['tabs','Tabs'],['collapse','Collapse'],['drawer','Drawer']].map(([v,l])=>(
              <button key={v} className={layout===v?'on':''} onClick={()=>setTweak('layoutMode',v)}>{l}</button>
            ))}
          </div>
        </div>
      </nav>

      {mainTab==='analysis' && (<>
        <div className="shell">
          <div className="hero">
            <h1>Cost-Effectiveness Analysis</h1>
            <p>Comparative analysis of intervention strategies · Kenya · KES</p>
          </div>

          {/* SPLIT */}
          {layout==='split' && (
            <div className="work">
              <div className="left"><InputPanel s={sharedInput}/></div>
              <div className="right">
                <div className="card">
                  <div className="card-h">Results</div>
                  {res ? <div style={{padding:'0 16px 8px'}}><ResultsView res={res} psaData={psaData} enablePSA={enablePSA}/></div> : <EmptyResults/>}
                </div>
              </div>
            </div>
          )}

          {/* TABS */}
          {layout==='tabs' && (<>
            <div className="subtabs">
              <button className={`subtab ${subtab==='setup'?'on':''}`} onClick={()=>setSubtab('setup')}>Setup</button>
              <button className={`subtab ${subtab==='results'?'on':''}`} onClick={()=>setSubtab('results')} disabled={!res}>Results</button>
            </div>
            <div className="tabpane">
              <div className="tabpane-inner">
                {subtab==='setup' && (
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18,alignItems:'start'}}><InputPanel s={sharedInput}/></div>
                )}
                {subtab==='results' && (res ? <ResultsView res={res} psaData={psaData} enablePSA={enablePSA}/> : <EmptyResults/>)}
              </div>
            </div>
          </>)}

          {/* COLLAPSE */}
          {layout==='collapse' && (
            <div className="work">
              {collapsed ? (
                <div className="summary-bar">
                  <div className="sb-item"><span className="sb-k">Strategies</span><span className="mono">{strategies.length}</span></div>
                  <div className="sb-item"><span className="sb-k">Outcome</span><span>{oL}</span></div>
                  <div className="sb-item"><span className="sb-k">Threshold</span><span className="mono">{thLabel}</span></div>
                  <div style={{flex:1}}/>
                  <button className="btn" onClick={()=>setCollapsed(false)}>✎ Edit inputs</button>
                </div>
              ) : (
                <div style={{display:'grid',gridTemplateColumns:'1.4fr 1fr',gap:18,alignItems:'start'}}><InputPanel s={sharedInput}/></div>
              )}
              {res && <div className="card"><div className="card-b"><ResultsView res={res} psaData={psaData} enablePSA={enablePSA}/></div></div>}
            </div>
          )}

          {/* DRAWER */}
          {layout==='drawer' && (
            <div className="work" style={{padding:'18px 24px 40px',display:'grid',gridTemplateColumns:'1.4fr 1fr',gap:18,alignItems:'start'}}>
              <InputPanel s={sharedInput}/>
              {res && <div style={{position:'sticky',top:70}}>
                <div className="card"><div className="card-h">Last Result <button className="btn" onClick={()=>setDrawerOpen(true)}>Open ▸</button></div>
                  <div className="card-b"><p className="hint">Analysis ready. Results open in a side panel.</p></div></div>
              </div>}
            </div>
          )}
        </div>

        {/* drawer overlay */}
        {layout==='drawer' && drawerOpen && res && (<>
          <div className="drawer-backdrop" onClick={()=>setDrawerOpen(false)}/>
          <div className="drawer">
            <div className="drawer-h"><h2>Analysis Results</h2><button className="icon-btn" onClick={()=>setDrawerOpen(false)}><IX/></button></div>
            <div className="drawer-body"><ResultsView res={res} psaData={psaData} enablePSA={enablePSA}/></div>
          </div>
        </>)}
      </>)}

      {mainTab==='help' && (
        <div className="shell" style={{padding:'24px'}}>
          <div className="card"><div className="card-h">About this tool</div><div className="card-b">
            <p style={{marginBottom:10}}>Enter intervention strategies with costs (KES) and health effects, choose a cost-effectiveness threshold, and run the analysis to generate ICERs, a cost-effectiveness plane, tornado diagram, CEAC and price-threshold analysis.</p>
            <p className="hint">Use the <strong>Layout</strong> switch in the top bar (or the Tweaks panel) to compare the four ways of arranging inputs and results.</p>
          </div></div>
        </div>
      )}

      {notif && <div className="notif">{notif}</div>}

      {showTweaks && (
        <div className="tweaks">
          <div className="tweaks-h">Tweaks <button className="x-btn" onClick={()=>{setShowTweaks(false); window.parent.postMessage({type:'__edit_mode_dismissed'},'*');}}>×</button></div>
          <div className="tweaks-b">
            <div className="tweak">
              <label>Layout mode</label>
              <div className="tweak-seg">
                {[['split','Split-pane'],['tabs','Tab switch'],['collapse','Collapse bar'],['drawer','Drawer']].map(([v,l])=>(
                  <button key={v} className={layout===v?'on':''} onClick={()=>setTweak('layoutMode',v)}>{l}</button>
                ))}
              </div>
            </div>
            <div className="tweak">
              <label>Accent</label>
              <div className="tweak-seg">
                {[['#0f766e','Teal'],['#1e3a5f','Navy'],['#9a6a3a','Clay'],['#7c5295','Plum']].map(([v,l])=>(
                  <button key={v} className={tweaks.accent===v?'on':''} onClick={()=>{setTweak('accent',v); document.documentElement.style.setProperty('--teal',v);}}>{l}</button>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
